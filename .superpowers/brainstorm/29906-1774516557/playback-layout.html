<h2>再生画面のレイアウト</h2>
<p class="subtitle">▶ 再生 をタップした後、動画をどう表示する？</p>

<div class="cards">
  <div class="card" data-choice="a" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#1e1e2e;padding:16px;border-radius:8px 8px 0 0">
      <!-- Phone mockup: inline swap -->
      <div style="width:130px;margin:0 auto;background:#11111b;border-radius:14px;padding:8px;box-shadow:0 4px 20px rgba(0,0,0,0.5)">
        <div style="font-size:9px;color:#a6adc8;text-align:center;margin-bottom:4px">Shot 2 / 5</div>
        <div style="background:#cba6f7;border-radius:4px;padding:4px;font-size:8px;color:#1e1e2e;text-align:center;margin-bottom:6px">「今日の天気はとても良く…」</div>
        <!-- video player replaces camera -->
        <div style="background:#000;border-radius:6px;height:60px;display:flex;align-items:center;justify-content:center;margin-bottom:6px;border:1px solid #45475a">
          <span style="font-size:20px">▶</span>
        </div>
        <div style="display:flex;gap:4px;justify-content:center">
          <span style="background:#f38ba8;color:#1e1e2e;padding:3px 8px;border-radius:20px;font-size:8px">🔄 撮り直し</span>
          <span style="background:#a6e3a1;color:#1e1e2e;padding:3px 8px;border-radius:20px;font-size:8px">次へ →</span>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>インライン切り替え</h3>
      <p>カメラプレビューが動画プレイヤーに切り替わる。ページ遷移なし、同じ画面内で完結。</p>
    </div>
  </div>

  <div class="card" data-choice="b" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#1e1e2e;padding:16px;border-radius:8px 8px 0 0">
      <!-- Phone mockup: modal overlay -->
      <div style="width:130px;margin:0 auto;background:#11111b;border-radius:14px;padding:8px;box-shadow:0 4px 20px rgba(0,0,0,0.5);position:relative">
        <div style="font-size:9px;color:#a6adc8;text-align:center;margin-bottom:4px">Shot 2 / 5</div>
        <div style="background:#cba6f7;border-radius:4px;padding:4px;font-size:8px;color:#1e1e2e;text-align:center;margin-bottom:6px">「今日の天気はとても良く…」</div>
        <div style="background:#313244;border-radius:6px;height:50px;margin-bottom:6px"></div>
        <!-- modal overlay -->
        <div style="position:absolute;inset:0;background:rgba(0,0,0,0.85);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:8px">
          <div style="background:#000;border-radius:6px;width:100%;height:60px;display:flex;align-items:center;justify-content:center;border:1px solid #45475a">
            <span style="font-size:20px">▶</span>
          </div>
          <div style="display:flex;gap:4px">
            <span style="background:#f38ba8;color:#1e1e2e;padding:3px 8px;border-radius:20px;font-size:8px">🔄 撮り直し</span>
            <span style="background:#a6e3a1;color:#1e1e2e;padding:3px 8px;border-radius:20px;font-size:8px">次へ →</span>
          </div>
          <span style="color:#a6adc8;font-size:8px">✕ 閉じる</span>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>モーダル（オーバーレイ）</h3>
      <p>画面の上に動画プレイヤーが重なって表示される。✕で閉じると元の録画画面に戻れる。</p>
    </div>
  </div>
</div>
