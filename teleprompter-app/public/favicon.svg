<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#0d0d20"/>
    </linearGradient>
    <linearGradient id="lens" x1="30%" y1="20%" x2="70%" y2="80%">
      <stop offset="0%" stop-color="#8b83ff"/>
      <stop offset="100%" stop-color="#5a4fcf"/>
    </linearGradient>
  </defs>
  <!-- background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- camera body -->
  <rect x="7" y="19" width="40" height="27" rx="5" fill="#1e1a3a"/>
  <!-- viewfinder bump -->
  <rect x="19" y="13" width="14" height="9" rx="3" fill="#1e1a3a"/>
  <!-- lens ring -->
  <circle cx="27" cy="32" r="11" fill="#2d2860"/>
  <!-- lens -->
  <circle cx="27" cy="32" r="9" fill="url(#lens)"/>
  <!-- lens shine -->
  <circle cx="23" cy="28" r="2.5" fill="white" opacity="0.25"/>
  <!-- pupil -->
  <circle cx="27" cy="32" r="3.5" fill="#0a0818"/>
  <!-- pupil glint -->
  <circle cx="26" cy="31" r="1" fill="white" opacity="0.6"/>
  <!-- REC dot -->
  <circle cx="44" cy="23" r="3" fill="#ff3b4e"/>
  <!-- text lines (teleprompter) -->
  <rect x="10" y="38" width="20" height="2.5" rx="1.25" fill="white" opacity="0.55"/>
  <rect x="10" y="33" width="14" height="2.5" rx="1.25" fill="white" opacity="0.35"/>
</svg>
